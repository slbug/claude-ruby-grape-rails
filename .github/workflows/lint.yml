name: Lint and Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown files
        run: npm run lint

  yaml:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint.yml
          strict: false

  json:
    name: JSON Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate JSON files
        run: |
          git ls-files -z '*.json' | while IFS= read -r -d '' file; do
            echo "Validating $file"
            python3 -m json.tool "$file" > /dev/null
          done

  release-metadata:
    name: Release Metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate release metadata and changelog links
        run: python3 scripts/check-release-metadata.py

  shell:
    name: Shell Syntax and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: |
          git ls-files -z '*.sh' '*.bash' '.husky/pre-commit' | while IFS= read -r -d '' file; do
            echo "Checking $file"
            bash -n "$file"
            shellcheck -x "$file"
          done

  eval-tests:
    name: Eval Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Run eval tests
        run: npm run eval:test

  eval-ci:
    name: Eval CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Run eval CI gate
        run: npm run eval:ci
