name: Lint and Eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: npm ci

      - name: Lint Markdown files
        run: npm run lint:markdown

      - name: Validate JSON files
        run: bash scripts/validate-json.sh

      - name: Validate YAML syntax
        run: bash scripts/validate-yaml.sh

      - name: Validate release metadata and changelog links
        run: python3 scripts/check-release-metadata.py

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: bash scripts/validate-shell.sh

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin structure
        run: claude plugin validate plugins/ruby-grape-rails

  eval:
    name: Eval CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # Ruby >= 3.4 is required by the plugin runtime hook and the
      # contributor eval CLI (lab/eval/bin/compress-verify) the
      # deterministic eval gate shells out to (Data.define,
      # frozen_string_literal: true, stdlib yaml). Fail fast in CI
      # rather than depending on whatever interpreter happens to be
      # on the runner.
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install dependencies
        run: npm ci

      - name: Install Python dev dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Run eval tests
        run: npm run eval:test

      - name: Run eval CI gate
        run: npm run eval:ci:deterministic
