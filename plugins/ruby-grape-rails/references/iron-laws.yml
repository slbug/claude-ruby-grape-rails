# Iron Laws Canonical Registry
# Source of truth for all Iron Laws across the Ruby/Grape/Rails plugin
# This file is the single source of truth; all other representations are generated from it
#
# Structure:
#   id: unique number
#   category: active_record, sidekiq, security, ruby, hotwire, verification
#   title: short human-readable name
#   rule: the actual rule text
#   rationale: why this matters
#   severity: critical, high, medium
#   applies_to: file patterns where relevant
#   summary_text: short form for summaries/cheat sheets
#   init_text: form for CLAUDE.md injection template
#   subagent_text: form for subagent context injection
#   detector_id: which programmatic detector checks this (null if behavioral only)
#   reference_files: markdown files with detailed examples

version: "1.2.0"
last_updated: "2026-05-03"
total_laws: 22

categories:
  - id: active_record
    name: "Active Record"
    description: "Database and ORM safety rules"
    law_count: 7
  - id: sidekiq
    name: "Sidekiq"
    description: "Background job safety rules"
    law_count: 4
  - id: security
    name: "Security"
    description: "Application security rules"
    law_count: 4
  - id: ruby
    name: "Ruby"
    description: "Ruby language and runtime rules"
    law_count: 3
  - id: hotwire
    name: "Hotwire/Turbo"
    description: "Hotwire and Turbo Stream rules"
    law_count: 2
  - id: verification
    name: "Verification & Discipline"
    description: "Testing, verification, and change discipline rules"
    law_count: 2

laws:
  # Active Record (7 laws)
  - id: 1
    category: active_record
    title: "Decimal for Money"
    rule: "NEVER use float for money — use decimal or integer (cents)"
    rationale: "Floating point arithmetic causes rounding errors that compound in financial calculations"
    severity: critical
    applies_to: ["db/migrate/*.rb", "*model*.rb"]
    summary_text: "Use decimal for money, never float"
    init_text: "NEVER use float for money — use decimal or integer cents"
    subagent_text: "Iron Law 1: NEVER use float for money — use decimal or integer cents"
    detector_id: "float_for_money"
    reference_files: []

  - id: 2
    category: active_record
    title: "Parameterized Queries"
    rule: "ALWAYS use parameterized queries — never interpolate user input into SQL strings"
    rationale: "String interpolation in SQL creates injection vulnerabilities"
    severity: critical
    applies_to: ["*.rb"]
    summary_text: "Use parameterized queries, never SQL interpolation"
    init_text: "ALWAYS use parameterized queries — never interpolate user input"
    subagent_text: "Iron Law 2: ALWAYS use parameterized queries — never SQL string interpolation"
    detector_id: "sql_interpolation"
    reference_files: []

  - id: 3
    category: active_record
    title: "Eager Loading"
    rule: "USE includes/preload for associations — avoids N+1 queries"
    rationale: "N+1 queries kill performance at scale"
    severity: high
    applies_to: ["app/models/*.rb", "app/controllers/*.rb"]
    summary_text: "Use includes/preload to prevent N+1 queries"
    init_text: "USE includes/preload for associations — avoids N+1 queries"
    subagent_text: "Iron Law 3: USE includes/preload for associations — never N+1 queries"
    detector_id: null
    reference_files: ["skills/ar-n1-check/references/preload-patterns.md"]

  - id: 4
    category: active_record
    title: "Commit-Safe Enqueueing in Active Record"
    rule: "IN Active Record code, use after_commit not after_save when enqueueing jobs that depend on committed data"
    rationale: "Jobs may run before transaction commits, reading uncommitted or stale data"
    severity: critical
    applies_to: ["app/models/*.rb"]
    summary_text: "In Active Record code, use after_commit when enqueueing jobs"
    init_text: "IN Active Record code, use after_commit not after_save when enqueueing jobs"
    subagent_text: "Iron Law 4: IN Active Record code, use after_commit not after_save when enqueueing jobs"
    detector_id: null
    reference_files: ["skills/rails-idioms/references/callbacks.md"]

  - id: 5
    category: active_record
    title: "Transaction Boundaries"
    rule: "WRAP multi-step operations in transactions — use ActiveRecord::Base.transaction"
    rationale: "Partial failures leave data in inconsistent states"
    severity: high
    applies_to: ["app/models/*.rb", "app/services/*.rb"]
    summary_text: "Wrap multi-step operations in transactions"
    init_text: "WRAP multi-step operations in transactions"
    subagent_text: "Iron Law 5: WRAP multi-step operations in ActiveRecord::Base.transaction"
    detector_id: null
    reference_files: ["skills/active-record-patterns/references/transactions.md"]

  - id: 6
    category: active_record
    title: "No Validation Bypass"
    rule: "NO update_columns, update_column, or save(validate: false) in normal flows"
    rationale: "Skipping validations bypasses business rules and can corrupt data"
    severity: high
    applies_to: ["app/models/*.rb", "app/services/*.rb"]
    summary_text: "Never bypass validations in normal code"
    init_text: "NO update_columns or save(validate: false) in normal flows"
    subagent_text: "Iron Law 6: NO update_columns or save(validate: false) in normal flows"
    detector_id: "validation_bypass"
    reference_files: ["skills/active-record-patterns/references/validations.md"]

  - id: 7
    category: active_record
    title: "No default_scope"
    rule: "NO default_scope — use explicit named scopes only"
    rationale: "default_scope creates invisible query conditions that surprise developers"
    severity: medium
    applies_to: ["app/models/*.rb"]
    summary_text: "Never use default_scope"
    init_text: "NO default_scope — use explicit scopes only"
    subagent_text: "Iron Law 7: NO default_scope — use explicit named scopes only"
    detector_id: "default_scope"
    reference_files: []

  # Sidekiq (4 laws)
  - id: 8
    category: sidekiq
    title: "Idempotent Jobs"
    rule: "Jobs MUST be idempotent — safe to retry"
    rationale: "Sidekiq retries failed jobs; non-idempotent jobs cause duplicate side effects"
    severity: critical
    applies_to: ["app/jobs/*.rb"]
    summary_text: "Jobs must be idempotent (safe to retry)"
    init_text: "Jobs MUST be idempotent — safe to retry"
    subagent_text: "Iron Law 8: Jobs MUST be idempotent — safe to retry"
    detector_id: null
    reference_files: ["skills/sidekiq/references/idempotency-patterns.md"]

  - id: 9
    category: sidekiq
    title: "JSON-Safe Arguments"
    rule: "Args use JSON-safe types only — no symbols, no Ruby objects, no procs"
    rationale: "Sidekiq serializes args to JSON; complex objects don't serialize correctly"
    severity: critical
    applies_to: ["app/jobs/*.rb"]
    summary_text: "Job args must be JSON-safe only"
    init_text: "Args use JSON-safe types only — no symbols, no Ruby objects"
    subagent_text: "Iron Law 9: Args use JSON-safe types only — no symbols, no Ruby objects, no procs"
    detector_id: null
    reference_files: ["skills/sidekiq/references/job-patterns.md"]

  - id: 10
    category: sidekiq
    title: "No ORM Objects in Args"
    rule: "NEVER store ORM objects in args — store IDs, not records"
    rationale: "ORM objects are not JSON-serializable and create stale data risks"
    severity: critical
    applies_to: ["app/jobs/*.rb"]
    summary_text: "Never pass ORM objects to jobs — pass IDs"
    init_text: "NEVER store ORM objects in args — store IDs"
    subagent_text: "Iron Law 10: NEVER store ORM objects in args — store IDs, not records"
    detector_id: "orm_objects_in_jobs"
    reference_files: ["skills/sidekiq/references/job-patterns.md"]

  - id: 11
    category: sidekiq
    title: "Commit-Safe Enqueueing"
    rule: >-
      ALWAYS enqueue jobs after commit using the active ORM or transaction hook — not after_save
      or inline before commit
    rationale: "Jobs must only run after data is persisted; commit-safe hooks differ between Active Record and Sequel"
    severity: critical
    applies_to: ["app/models/*.rb"]
    summary_text: "Always enqueue jobs after commit using the active ORM"
    init_text: "ALWAYS enqueue jobs after commit using the active ORM or transaction hook"
    subagent_text: "Iron Law 11: ALWAYS enqueue jobs after commit using the active ORM or transaction hook"
    detector_id: null
    reference_files: []

  # Security (4 laws)
  - id: 12
    category: security
    title: "No Ruby Eval"
    rule: "NO Ruby `eval`/`instance_eval`/`class_eval` with user input — code injection vulnerability. Shell `eval` of trusted helper output is out of scope."
    rationale: "Ruby `eval` executes arbitrary code; user input is remote code execution. Scope: Ruby `*.rb`. Shell `eval` of trusted helper output has different semantics, out of scope."
    severity: critical
    applies_to: ["*.rb"]
    summary_text: "Never use Ruby eval with user input"
    init_text: "NO Ruby `eval`/`instance_eval`/`class_eval` with user input — code injection vulnerability"
    subagent_text: "Iron Law 12: NO Ruby `eval`/`instance_eval`/`class_eval` with user input — code injection vulnerability. Shell `eval` of trusted helper output is out of scope."
    detector_id: null
    reference_files: []

  - id: 13
    category: security
    title: "Explicit Authorization"
    rule: "AUTHORIZE in EVERY controller action — do not trust before_action alone"
    rationale: "before_action can be skipped; explicit authorization is harder to bypass"
    severity: critical
    applies_to: ["app/controllers/*.rb"]
    summary_text: "Authorize explicitly in every action"
    init_text: "AUTHORIZE in EVERY controller action"
    subagent_text: "Iron Law 13: AUTHORIZE in EVERY controller action — do not trust before_action alone"
    detector_id: null
    reference_files: ["skills/security/references/authorization.md"]

  - id: 14
    category: security
    title: "No Unsafe HTML"
    rule: "NEVER use html_safe or raw with untrusted content — XSS vulnerability"
    rationale: "html_safe bypasses Rails' XSS protection; untrusted content executes scripts"
    severity: critical
    applies_to: ["app/views/*.erb", "app/helpers/*.rb", "*.rb"]
    summary_text: "Never use html_safe/raw on untrusted content"
    init_text: "NEVER use html_safe or raw with untrusted content"
    subagent_text: "Iron Law 14: NEVER use html_safe or raw with untrusted content — XSS vulnerability"
    detector_id: "unsafe_html"
    reference_files: []

  - id: 15
    category: security
    title: "No SQL Concatenation"
    rule: "NO SQL string concatenation — always use parameterized queries"
    rationale: "String building in SQL creates injection vectors"
    severity: critical
    applies_to: ["*.rb"]
    summary_text: "Never concatenate SQL strings"
    init_text: "NO SQL string concatenation — always use parameterized queries"
    subagent_text: "Iron Law 15: NO SQL string concatenation — always use parameterized queries"
    detector_id: "sql_interpolation"
    reference_files: []

  # Ruby (3 laws)
  - id: 16
    category: ruby
    title: "method_missing Requires respond_to_missing?"
    rule: "NO method_missing without respond_to_missing? — breaks introspection"
    rationale: "Libraries and developers expect respond_to? to match method behavior"
    severity: medium
    applies_to: ["*.rb"]
    summary_text: "Always pair method_missing with respond_to_missing?"
    init_text: "NO method_missing without respond_to_missing?"
    subagent_text: "Iron Law 16: NO method_missing without respond_to_missing? — breaks introspection"
    detector_id: null
    reference_files: []

  - id: 17
    category: ruby
    title: "Supervise Background Processes"
    rule: "SUPERVISE ALL BACKGROUND PROCESSES — use proper process managers in production"
    rationale: "Unsupervised processes crash silently and don't restart"
    severity: high
    applies_to: ["config/puma.rb", "config/unicorn.rb", "Procfile", "*.rb"]
    summary_text: "Always supervise background processes"
    init_text: "SUPERVISE ALL BACKGROUND PROCESSES"
    subagent_text: "Iron Law 17: SUPERVISE ALL BACKGROUND PROCESSES — use proper process managers"
    detector_id: null
    reference_files: []

  - id: 18
    category: ruby
    title: "Rescue StandardError"
    rule: "DON'T RESCUE Exception — only rescue StandardError or specific classes"
    rationale: "Rescuing Exception catches system signals (SIGTERM, etc.) and SyntaxError"
    severity: high
    applies_to: ["*.rb"]
    summary_text: "Only rescue StandardError, never Exception"
    init_text: "DON'T RESCUE Exception — only rescue StandardError"
    subagent_text: "Iron Law 18: DON'T RESCUE Exception — only rescue StandardError or specific classes"
    detector_id: null
    reference_files: ["skills/ruby-idioms/references/error-handling.md"]

  # Hotwire/Turbo (2 laws)
  - id: 19
    category: hotwire
    title: "No DB Queries in Turbo Streams"
    rule: "NEVER query DB in Turbo Stream responses — pre-compute everything before broadcast"
    rationale: "Turbo Streams render outside request cycle; DB queries cause errors or N+1"
    severity: high
    applies_to: ["app/views/*.turbo_stream.erb", "app/controllers/*.rb"]
    summary_text: "Pre-compute all data before Turbo Stream broadcast"
    init_text: "NEVER query DB in Turbo Stream responses"
    subagent_text: "Iron Law 19: NEVER query DB in Turbo Stream responses — pre-compute everything"
    detector_id: null
    reference_files: []

  - id: 20
    category: hotwire
    title: "Use turbo_frame_tag"
    rule: "ALWAYS use turbo_frame_tag for partial updates — prevents full page reloads"
    rationale: "Without frames, Turbo Drive reloads the entire page"
    severity: medium
    applies_to: ["app/views/**/*.erb"]
    summary_text: "Use turbo_frame_tag for partial page updates"
    init_text: "ALWAYS use turbo_frame_tag for partial updates"
    subagent_text: "Iron Law 20: ALWAYS use turbo_frame_tag for partial updates"
    detector_id: null
    reference_files: []

  # Verification & Discipline (2 laws)
  - id: 21
    category: verification
    title: "Verify Before Claiming Done"
    rule: >-
      VERIFY BEFORE CLAIMING DONE — never say 'should work' or 'this fixes it.'
      Run bundle exec rspec or bin/rails test and show the result
    rationale: "Claims without verification are assumptions; test output proves the fix"
    severity: critical
    applies_to: ["*.rb"]
    summary_text: "Always run tests and show results before claiming done"
    init_text: "VERIFY BEFORE CLAIMING DONE — run tests and show results"
    subagent_text: "Iron Law 21: VERIFY BEFORE CLAIMING DONE — never say 'should work' — run tests and show results"
    detector_id: null
    reference_files: ["skills/testing/references/discipline.md"]

  - id: 22
    category: verification
    title: "Surgical Changes Only"
    rule: >-
      Every changed line should trace directly to the user's request.
      Don't "improve" adjacent code, comments, or formatting you weren't asked to touch.
    rationale: "If you write 200 lines and it could be 50, rewrite it"
    severity: high
    applies_to: ["*.rb"]
    summary_text: "Only change what the user asked for — no drive-by improvements"
    init_text: "SURGICAL CHANGES ONLY — every changed line traces to the user's request"
    subagent_text: "Iron Law 22: SURGICAL CHANGES ONLY — every changed line must trace to the user's request. Don't improve adjacent code."
    detector_id: null
    reference_files: []

# Enforcement configuration
enforcement:
  programmatic:
    description: "Hook-level automatic detection via pattern matching"
    laws_with_detectors: [1, 2, 6, 7, 10, 14, 15]
    script: "hooks/scripts/iron-law-verifier.sh"

  behavioral:
    description: "Injected into main session and subagent contexts via SessionStart + SubagentStart hooks"
    all_laws: true
    injection_script: "hooks/scripts/inject-rules.sh"

  review_time:
    description: "Checked during /rb:review by specialist agents"
    agent: "iron-law-judge"
    all_laws: true

# Generation targets
generation_targets:
  - file: "README.md"
    section: "Iron Laws summary"
    marker: "<!-- IRON_LAWS_START -->"

  - file: "skills/iron-laws/references/canonical-registry.md"
    section: "Full human-readable registry"
    format: "markdown_projection"

  - file: "skills/intro/references/tutorial-content.md"
    section: "Tutorial Iron Laws section"
    marker: "<!-- IRON_LAWS_START -->"

  - file: "plugins/ruby-grape-rails/hooks/scripts/inject-rules.sh"
    format: "shell_json_output"
    template: "subagent_text format"
    delivery: "SessionStart (main session) + SubagentStart (per-subagent)"

  - file: "agents/iron-law-judge.md"
    section: "Iron Laws Overview"
    format: "conditional"
    condition: "Phase 0B decision = Option A or C"
