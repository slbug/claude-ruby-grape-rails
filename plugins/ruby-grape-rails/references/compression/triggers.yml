# plugins/ruby-grape-rails/references/compression/triggers.yml
# Commands whose stdout is eligible for observation compression.
# No broad `bundle exec rake` matcher — too wide.

# Env-prefix is a leading run of `KEY=value` (or `KEY=`) assignments separated
# by whitespace, e.g. `RAILS_ENV=test BUNDLE_GEMFILE=Gemfile rspec`.  All
# patterns below tolerate any number of those prefixes via `(\\S+=\\S*\\s+)*`.
#
# Binstub-prefix is `bin/` or `./bin/` directly before the verb, e.g.
# `bin/rspec spec/foo` or `./bin/rake test` — common in Rails apps.
# Patterns below tolerate exactly those two forms via `(?:\\./)?bin/`
# (optional `./`, then `bin/`). System-level paths like `/bin/rspec`
# or stray `.bin/` directories are NOT matched.
verify_commands:
  direct:
    - "^(\\S+=\\S*\\s+)*(?:(?:\\./)?bin/)?rspec\\b"
    - "^(\\S+=\\S*\\s+)*(?:(?:\\./)?bin/)?rubocop\\b"
    - "^(\\S+=\\S*\\s+)*(?:(?:\\./)?bin/)?standardrb\\b"
    - "^(\\S+=\\S*\\s+)*(?:(?:\\./)?bin/)?brakeman\\b"
    - "^(\\S+=\\S*\\s+)*(?:(?:\\./)?bin/)?reek\\b"
    - "^(\\S+=\\S*\\s+)*bundle exec (?:(?:\\./)?bin/)?(rspec|rubocop|standardrb|brakeman|reek)\\b"
  migrations:
    - "^(\\S+=\\S*\\s+)*(bundle exec )?(?:(?:\\./)?bin/)?rails db:(migrate|rollback|schema:load|seed)\\b"
  rake_verify_only:
    - "^(\\S+=\\S*\\s+)*(bundle exec )?(?:(?:\\./)?bin/)?(rake|rails) (ci|test|spec|verify|lint|standard:fix_unsafely|brakeman)\\b"

# Universal exclusion list checked BEFORE the trigger sections. The
# key is named `rake_excluded` for historical reasons but the matcher
# applies it across every trigger family. `rake` and `rails` share
# the same subcommand shape (routes, db:drop, db:create, ...); both
# are excluded together. `--version` invocations across the whole
# verify-tool family produce a static banner that never compresses
# and would inflate the underpowered-class denominator.
rake_excluded:
  - "^(\\S+=\\S*\\s+)*(bundle exec )?(?:(?:\\./)?bin/)?(rake|rails) (routes|db:drop|db:create|assets:|stats|notes)\\b"
  - "^(\\S+=\\S*\\s+)*(bundle exec )?(?:(?:\\./)?bin/)?(rake|rails|rspec|rubocop|standardrb|brakeman|reek) --version\\b"
