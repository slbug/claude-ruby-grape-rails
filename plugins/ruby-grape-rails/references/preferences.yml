  - id: 1
    category: research
    title: "Prefer Context7 MCP for Library Docs"
    rule: "PREFER Context7 MCP (`mcp__*context7*__query-docs` / `resolve-library-id`) over WebFetch for library, gem, framework, or API docs — fallback to WebFetch only when Context7 tools are not available"
    rationale: "Context7 returns up-to-date, version-specific docs from official sources; WebFetch may fetch stale or partial pages. Prevents wasted roundtrips during review/audit/investigate on unknown gems."
    severity: medium
    applies_to: ["*"]
    summary_text: "Prefer Context7 MCP over WebFetch for library docs"
    init_text: "PREFER Context7 MCP over WebFetch for library/gem/framework docs when `mcp__*context7*__*` tools are available"
    subagent_text: "Preference: PREFER Context7 MCP (`mcp__*context7*__query-docs` / `resolve-library-id`) over WebFetch for library/gem docs — fallback to WebFetch only if Context7 tools unavailable"
    reference_files: ["research/context7-usage.md"]

  - id: 2
    category: behavioral
    title: "Challenge False Premises"
    rule: "CHALLENGE false user premises before executing. If the request contradicts repo evidence, surface the conflict directly before proceeding — a correct plan beats a compliant plan built on a wrong assumption."
    rationale: "Sycophancy in RLHF models prefers agreement over truthfulness (Anthropic ICLR 2024 sycophancy paper). Surfacing false premises preserves correctness; compliance with wrong framing produces correct-looking but broken artifacts."
    severity: medium
    applies_to: ["*"]
    summary_text: "Challenge false premises before executing"
    init_text: "CHALLENGE false user premises before executing — surface conflicts with repo evidence directly"
    subagent_text: "Preference: CHALLENGE false user premises before executing. If request contradicts repo evidence, surface the conflict before proceeding."
    reference_files: ["research/epistemic-posture.md"]

  - id: 3
    category: behavioral
    title: "Avoid Sycophancy Loops"
    rule: "AVOID unsupported agreement, apology cascades, and hedge chains. Acknowledge mistakes once, state the correction, and continue. Use direct language for HIGH-confidence findings."
    rationale: "Apology loops and hedge cascades reinforce defensive output patterns across subsequent turns. Direct language on HIGH-confidence findings preserves signal strength for the user."
    severity: medium
    applies_to: ["*"]
    summary_text: "No apology loops, no hedge cascades, direct HIGH-confidence language"
    init_text: "AVOID apology cascades and hedge chains — acknowledge mistakes once, state the correction, continue"
    subagent_text: "Preference: AVOID unsupported agreement, apology cascades, and hedge chains. Acknowledge mistakes once, continue. Direct language for HIGH-confidence findings."
    reference_files: ["research/epistemic-posture.md"]

  - id: 4
    category: behavioral
    title: "Prefer Positive Framing"
    rule: "PREFER positive success targets over long chains of prohibitions when writing task instructions or success criteria."
    rationale: "Anthropic prompt engineering docs (Claude 4 Best Practices) recommend showing desired output shape over listing what to avoid. Negative-only instruction chains push models toward defensive over-checking."
    severity: low
    applies_to: ["*"]
    summary_text: "Positive success targets over prohibition chains"
    init_text: "PREFER positive success targets over long prohibition chains in task instructions"
    subagent_text: "Preference: PREFER positive success targets over prohibition chains in task instructions and success criteria."
    reference_files: ["research/epistemic-posture.md"]

  - id: 5
    category: tooling
    title: "Batch Tool Calls; Avoid Improvised Scripts"
    rule: "PREFER batched, structured search over per-item shell loops. When the `Grep` / `Glob` tools are available (npm / Windows CC builds), use them. On native macOS/Linux CC 2.1.117+ those tools are removed; use `ugrep` / `bfs` via Bash instead — both are CC-embedded primitives optimized for code search and faster than POSIX `grep -rn` / `find`. Always use `Read` over `cat`/`head`/`tail`. Batch tool calls over per-item iteration: batch `git diff` / `git log` / `git blame` by path group; batch gem inspection by reading Gemfile.lock once instead of looping `bundle info`; exclude high-noise paths via pathspec (cassettes, fixtures, schema dumps, lockfiles, generated files). Avoid multi-line bash or python one-liners that loop, `cat`, or `find -exec` to dump large output into context. Per-file calls allowed when the file is genuinely the unit of investigation."
    rationale: "Structured search primitives (`Grep`/`Glob` tools, or `ugrep`/`bfs` on native CC) return bounded output, respect VCS-aware exclusions, and are batch-friendly. POSIX `grep -rn` / `find` return raw text, ignore filters, count one call per single-path invocation, and force per-file iteration. Per-item shell loops (`for f in $FILES; do git diff -- $f; done`) burn turn budget and produce repetitive, low-signal output. Batched path-group calls and structured tools are bounded, idempotent, and reviewable."
    severity: medium
    applies_to: ["*"]
    summary_text: "Prefer `Grep`/`Glob` tools or `ugrep`/`bfs` over shell `grep -rn`/`find`/`cat`; batch by path group"
    init_text: "Prefer `Grep`/`Glob` tools when available; otherwise use `ugrep` / `bfs` over shell `grep -rn`/`find`. Use `Read` over `cat`/`head`/`tail`. Batch `git diff`/`git log` by path group. Exclude high-noise paths via pathspec."
    subagent_text: "Preference: prefer the `Grep` / `Glob` tools when available; otherwise use `ugrep` / `bfs` (CC-embedded, native macOS/Linux 2.1.117+) over shell `grep -rn` / `find`. Use `Read` over `cat`/`head`/`tail`. Batch `git diff` / `git log` / gem inspection by path group, never per-item loops. Exclude high-noise paths (cassettes, fixtures, lockfiles) via pathspec. Per-file allowed when the file is the unit of investigation."
    reference_files: ["research/tool-batching.md"]

  - id: 6
    category: tooling
    title: "Bash Bodies Execute, Not Narrate"
    rule: "Bash command bodies are for execution, not commentary. Do NOT include `#` thinking/hypothesis/checklist lines inside Bash command strings — they consume input tokens, obscure the dispatched command in agent transcripts, and serve no execution purpose. Record reasoning, hypotheses, and checklists in artifacts (durable) or in thinking (private), never inside Bash command input."
    rationale: "Observed: agents (testing-reviewer, iron-law-judge) emit Bash commands with multi-line `# Check ...` prefixes used as thinking-out-loud surface. A multi-line Bash body is a single tool dispatch, but the `#`-only lines inflate input tokens and blur the dispatched command in transcripts. Reasoning belongs in artifacts (durable, reviewable) or in thinking (private), not in command strings."
    severity: medium
    applies_to: ["*"]
    summary_text: "No `#` commentary lines inside Bash commands; reasoning belongs in artifacts or thinking"
    init_text: "Bash command bodies execute, not narrate. Do NOT include `#` thinking/checklist lines inside Bash commands — record reasoning in artifacts or thinking instead."
    subagent_text: "Preference: Bash command bodies execute, not narrate. Do NOT include `#` thinking/hypothesis/checklist lines inside Bash command strings. Record reasoning in artifacts (durable) or in thinking (private), never in Bash command input."
    reference_files: ["research/tool-batching.md"]
