preferences:
  - id: 1
    category: research
    title: "Prefer Context7 MCP for Library Docs"
    rule: "PREFER Context7 MCP (`mcp__*context7*__query-docs` / `resolve-library-id`) over WebFetch for library, gem, framework, or API docs — fallback to WebFetch only when Context7 tools are not available"
    rationale: "Context7 returns up-to-date, version-specific docs from official sources; WebFetch may fetch stale or partial pages. Prevents wasted roundtrips during review/audit/investigate on unknown gems."
    severity: medium
    applies_to: ["*"]
    summary_text: "Prefer Context7 MCP over WebFetch for library docs"
    init_text: "PREFER Context7 MCP over WebFetch for library/gem/framework docs when `mcp__*context7*__*` tools are available"
    subagent_text: "Preference: PREFER Context7 MCP (`mcp__*context7*__query-docs` / `resolve-library-id`) over WebFetch for library/gem docs — fallback to WebFetch only if Context7 tools unavailable"
    reference_files: ["research/context7-usage.md"]

  - id: 2
    category: behavioral
    title: "Challenge False Premises"
    rule: "CHALLENGE false user premises before executing. If the request contradicts repo evidence, surface the conflict directly before proceeding — a correct plan beats a compliant plan built on a wrong assumption."
    rationale: "Sycophancy in RLHF models prefers agreement over truthfulness (Anthropic ICLR 2024 sycophancy paper). Surfacing false premises preserves correctness; compliance with wrong framing produces correct-looking but broken artifacts."
    severity: medium
    applies_to: ["*"]
    summary_text: "Challenge false premises before executing"
    init_text: "CHALLENGE false user premises before executing — surface conflicts with repo evidence directly"
    subagent_text: "Preference: CHALLENGE false user premises before executing. If request contradicts repo evidence, surface the conflict before proceeding."
    reference_files: ["research/epistemic-posture.md"]

  - id: 3
    category: behavioral
    title: "Avoid Sycophancy Loops"
    rule: "AVOID unsupported agreement, apology cascades, and hedge chains. Acknowledge mistakes once, state the correction, and continue. Use direct language for HIGH-confidence findings."
    rationale: "Apology loops and hedge cascades reinforce defensive output patterns across subsequent turns. Direct language on HIGH-confidence findings preserves signal strength for the user."
    severity: medium
    applies_to: ["*"]
    summary_text: "No apology loops, no hedge cascades, direct HIGH-confidence language"
    init_text: "AVOID apology cascades and hedge chains — acknowledge mistakes once, state the correction, continue"
    subagent_text: "Preference: AVOID unsupported agreement, apology cascades, and hedge chains. Acknowledge mistakes once, continue. Direct language for HIGH-confidence findings."
    reference_files: ["research/epistemic-posture.md"]

  - id: 4
    category: behavioral
    title: "Prefer Positive Framing"
    rule: "PREFER positive success targets over long chains of prohibitions when writing task instructions or success criteria."
    rationale: "Anthropic prompt engineering docs (Claude 4 Best Practices) recommend showing desired output shape over listing what to avoid. Negative-only instruction chains push models toward defensive over-checking."
    severity: low
    applies_to: ["*"]
    summary_text: "Positive success targets over prohibition chains"
    init_text: "PREFER positive success targets over long prohibition chains in task instructions"
    subagent_text: "Preference: PREFER positive success targets over prohibition chains in task instructions and success criteria."
    reference_files: ["research/epistemic-posture.md"]

  - id: 5
    category: tooling
    title: "Batch Tool Calls; Avoid Improvised Scripts"
    rule: "PREFER batched tool calls over per-item iteration. Use Read/Grep/Glob for files; batch `git diff` / `git log` / `git blame` by path group; batch gem inspection by reading Gemfile.lock once instead of looping `bundle info`; exclude high-noise paths via pathspec (cassettes, fixtures, schema dumps, lockfiles, generated files). Avoid multi-line bash or python one-liners that loop, `cat`, or `find -exec` to dump large output into context. Per-file calls allowed when the file is genuinely the unit of investigation."
    rationale: "Per-item shell loops (`for f in $FILES; do git diff -- $f; done`) burn turn budget and produce repetitive, low-signal output. Improvised scripts that pipe whole-file contents through shell chains stream large unbounded text into context, slowing every downstream step. Batched path-group calls and tool-native operations (Read/Grep/Glob) are bounded, idempotent, and reviewable. Pathspec exclusion of high-noise content keeps signal density high."
    severity: medium
    applies_to: ["*"]
    summary_text: "Batch tool calls by path group; avoid loop/cat/dump scripts"
    init_text: "PREFER batched tool calls over per-item loops; use Read/Grep/Glob over `cat`/`find -exec`; exclude high-noise paths via pathspec"
    subagent_text: "Preference: PREFER batched tool calls (`git diff` / `grep` / gem inspection) by path group over per-item loops. Exclude high-noise paths via pathspec. Use Read/Grep/Glob over `cat`/`find -exec`. Avoid multi-line bash that loops or dumps large output into context. Per-file allowed when the file is the unit of investigation."
    reference_files: ["research/tool-batching.md"]
